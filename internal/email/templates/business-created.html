<!doctype html>
<html>
  <body style="margin: 0; padding: 0; background-color: #f4f4f4">
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
      style="background-color: #f4f4f4"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="
              background: #ffffff;
              margin: 20px auto;
              padding: 20px;
              border-radius: 8px;
              font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                Arial, sans-serif;
            "
          >
            <tr>
              <td align="center">
                <h1 style="margin: 0 0 16px 0; font-size: 24px; color: #333">
                  Bienvenido a Calth
                </h1>
                <p style="margin: 0; font-size: 16px; color: #555">
                  Tu negocio <strong>{{companyName}}</strong> fue creado
                  exitosamente.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top: 20px">
                <a
                  href="{{companyLink}}"
                  target="_blank"
                  style="
                    display: inline-block;
                    background-color: #3b82f6;
                    color: white;
                    font-size: 16px;
                    padding: 10px 16px;
                    text-decoration: none;
                    border-radius: 6px;
                  "
                >
                  Ingresar a tu negocio
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
