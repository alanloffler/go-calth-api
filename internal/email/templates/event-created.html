<!doctype html>
<html>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                Arial, sans-serif;
        "
    >
        <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
        >
            <tr>
                <td align="center">
                    <table
                        role="presentation"
                        width="600"
                        cellspacing="0"
                        cellpadding="0"
                        border="0"
                        style="margin: 20px auto"
                    >
                        <tr>
                            <td style="padding: 10px 0">
                                <table
                                    role="presentation"
                                    cellspacing="0"
                                    cellpadding="0"
                                    border="0"
                                >
                                    <tr>
                                        <td style="vertical-align: middle">
                                            <div
                                                style="
                                                    background-color: #3b82f6;
                                                    color: #ffffff;
                                                    width: 32px;
                                                    height: 32px;
                                                    line-height: 32px;
                                                    text-align: center;
                                                    border-radius: 8px;
                                                    font-weight: bold;
                                                    font-size: 18px;
                                                "
                                            >
                                                C
                                            </div>
                                        </td>
                                        <td width="10"></td>
                                        <td style="vertical-align: middle">
                                            <span
                                                style="
                                                    font-size: 22px;
                                                    font-weight: bold;
                                                    color: #333;
                                                "
                                                >Calth</span
                                            >
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <tr>
                            <td
                                style="
                                    background-color: #ffffff;
                                    border-radius: 8px;
                                    padding: 24px;
                                "
                            >
                                <h1
                                    style="
                                        margin: 0 0 20px 0;
                                        font-size: 24px;
                                        color: #333;
                                        text-align: center;
                                    "
                                >
                                    Turno nuevo
                                </h1>
                                <p
                                    style="
                                        margin: 0 0 20px 0;
                                        font-size: 16px;
                                        color: #555;
                                        text-align: left;
                                    "
                                >
                                    Hola {{fullName}}, tenés un nuevo turno en
                                    <strong>{{companyName}}</strong>.
                                </p>
                                <table
                                    role="presentation"
                                    width="100%"
                                    cellspacing="0"
                                    cellpadding="0"
                                    border="0"
                                    style="font-size: 16px; color: #555"
                                >
                                    <tr>
                                        <td style="padding: 5px 0">
                                            <strong>Título:</strong>{{title}}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding: 5px 0">
                                            <strong>Fecha:</strong>{{startDate}}
                                        </td>
                                    </tr>
                                </table>

                  <tr>
                    <td align="center" style="padding-top: 24px">
                      <a
                        href="{{companyLink}}"
                        target="_blank"
                        style="

                          border-radius: 6px;
                        "
                      >
                        Ingresar a tu negocio
                      </a>
                    </td>
                  </tr>
                </table>-->
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
